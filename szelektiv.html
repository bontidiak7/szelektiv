<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2> Szelektív hulladékgyűjtés</h2>

<div id="info">
    Pontszám: <span id="score">0</span> |
    Hibák: <span id="errors">0</span> |
    Idő: <span id="time">60</span>
</div>
<div id="gameArea">

    <div id="feedback" class="feedback"></div>

    <div id="trash" draggable="true"></div>

    <div class="bins">

        <div class="bin" data-type="paper">
            Papír<br>
            <span class="count">0</span>
        </div>

        <div class="bin" data-type="plastic">
            Műanyag<br>
            <span class="count">0</span>
        </div>

        <div class="bin" data-type="metal">
            Fém<br>
            <span class="count">0</span>
        </div>

        <div class="bin" data-type="mixed">
            Vegyes<br>
            <span class="count">0</span>
        </div>

    </div>

</div>

<script src="szelektiv.js"></script>



    
</body>
</html>
